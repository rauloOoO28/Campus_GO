{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusGo · Ruta calculada</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="">

<link rel="stylesheet" href="{% static 'core/css/base.css' %}">
<link rel="stylesheet" href="{% static 'core/css/components.css' %}">
<link rel="stylesheet" href="{% static 'core/css/layout.css' %}">
<link rel="stylesheet" href="{% static 'core/css/shell.css' %}">
<link rel="stylesheet" href="{% static 'core/css/route.css' %}">

<style>
.leaflet-map-route {
    width: 100%;
    height: 100%;
    border-radius: var(--radius-xl);
    min-height: 500px;
    z-index: 1;
}
.leaflet-container { font-family: var(--font-family); }

/* Pin origen (verde) */
.pin-origen {
    background: var(--color-primary);
    width: 36px; height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 3px solid white;
    box-shadow: 0 4px 12px rgba(14, 158, 142, 0.5);
    display: flex; align-items: center; justify-content: center;
}
.pin-origen i { transform: rotate(45deg); color: white; font-size: 16px; }

/* Pin destino (naranja) */
.pin-destino {
    background: var(--color-secondary);
    width: 36px; height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 3px solid white;
    box-shadow: 0 4px 12px rgba(232, 114, 28, 0.5);
    display: flex; align-items: center; justify-content: center;
}
.pin-destino i { transform: rotate(45deg); color: white; font-size: 16px; }

/* Estado de carga / error */
.route-loading {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    padding: 60px 20px;
    color: var(--color-text-muted);
}
.route-loading i { font-size: 32px; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Banner Fase 1 / Beta */
.beta-banner {
    background: rgba(245, 197, 24, 0.12);
    border: 1.5px solid rgba(245, 197, 24, 0.4);
    color: #8a6b00;
    padding: 10px 14px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    margin-top: 12px;
}
</style>
</head>

<body data-active="route">

<div data-mount="proto-nav"></div>

<div class="app-shell">

    <div data-mount="sidebar"></div>

    <div class="main-wrapper">

        <header class="topbar">
            <button class="mobile-menu-toggle"><i class="bi bi-list"></i></button>
            <div class="topbar-left">
                <a class="btn-icon" href="{% url 'core:map' %}"><i class="bi bi-arrow-left"></i></a>
                <div>
                    <div class="topbar-title">Tu ruta</div>
                    <div class="topbar-subtitle" id="topbar-subtitle">Calculando la mejor ruta...</div>
                </div>
            </div>
            <div class="topbar-actions">
                <button class="btn-icon" title="Compartir ruta"><i class="bi bi-share-fill"></i></button>
                <a class="btn-action-primary" href="{% url 'core:map' %}">
                    <i class="bi bi-map-fill"></i> Volver al mapa
                </a>
            </div>
        </header>

        <main class="page-content">

            <div class="breadcrumbs">
                <a href="{% url 'core:campus' %}">Campus</a>
                <span class="separator"><i class="bi bi-chevron-right"></i></span>
                <a href="{% url 'core:map' %}">ESCOM IPN</a>
                <span class="separator"><i class="bi bi-chevron-right"></i></span>
                <span class="current">Ruta</span>
            </div>

            <div class="route-layout">

                <!-- Panel izquierdo: info de la ruta -->
                <div class="route-panel" id="route-panel">
                    <div class="route-loading">
                        <i class="bi bi-arrow-clockwise" style="animation: spin 1s linear infinite;"></i>
                        <p style="font-size: 13px; font-weight: 600;">Calculando ruta...</p>
                    </div>
                </div>

                <!-- Mapa Leaflet con la ruta -->
                <div class="route-map">
                    <div id="leaflet-map" class="leaflet-map-route"></div>
                </div>

            </div>

        </main>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
// Pasar datos del usuario autenticado a JavaScript
window.USER_DATA = {
    is_authenticated: {{ request.user.is_authenticated|lower }},
    is_admin: {{ request.user.is_superuser|lower }},
    {% if request.user.is_authenticated and perfil %}
        nombre_completo: "{{ perfil.nombre_completo }}",
        rol: "{{ perfil.get_rol_display }}",
        email: "{{ request.user.email }}",
        initials: "{{ perfil.nombre_completo|truncatewords:2|join:''|slice:':2'|upper }}"
    {% else %}
        nombre_completo: "Invitado",
        rol: "Invitado",
        email: "",
        initials: "IV"
    {% endif %}
};
</script>

<script src="{% static 'core/js/shell.js' %}"></script>

<script>
(function() {
    'use strict';

    const RUTA_API   = '/api/ruta/';
    const MAPA_URL   = `{% url 'core:map' %}`;

    // Leer parámetros ?desde=X&hasta=Y de la URL
    const params = new URLSearchParams(window.location.search);
    const codigoDesde = params.get('desde');
    const codigoHasta = params.get('hasta');

    // Si no hay parámetros válidos, redirigir al mapa
    if (!codigoDesde || !codigoHasta) {
        mostrarError(
            'No se especificaron origen y destino.',
            'Vuelve al mapa y selecciona un punto de partida usando QR.',
            true
        );
        return;
    }

    // ============================================================
    // ÍCONOS
    // ============================================================
    const ICONO_ORIGEN = L.divIcon({
        className: '',
        html: '<div class="pin-origen"><i class="bi bi-geo-alt-fill"></i></div>',
        iconSize: [36, 36],
        iconAnchor: [18, 36],
        popupAnchor: [0, -36],
    });

    const ICONO_DESTINO = L.divIcon({
        className: '',
        html: '<div class="pin-destino"><i class="bi bi-flag-fill"></i></div>',
        iconSize: [36, 36],
        iconAnchor: [18, 36],
        popupAnchor: [0, -36],
    });

    // ============================================================
    // MAPA
    // ============================================================
    let mapa;
    function iniciarMapa(centro, zoom = 17) {
        mapa = L.map('leaflet-map', { zoomControl: false }).setView(centro, zoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19,
        }).addTo(mapa);
        L.control.zoom({ position: 'topright' }).addTo(mapa);
    }

    // ============================================================
    // RENDER DEL PANEL LATERAL
    // ============================================================
    function renderizarPanel(data) {
        const panel = document.getElementById('route-panel');
        const { origen, destino, stats, instrucciones, metodo } = data;

        const esBeta = metodo === 'linea_inteligente';

        panel.innerHTML = `
            <div class="route-from-to">
                <div class="route-point-row">
                    <div class="route-point-info">
                        <div class="route-point-label">Origen</div>
                        <div class="route-point-name">${origen.nombre}</div>
                    </div>
                </div>
                <div class="route-point-row destination">
                    <div class="route-point-info">
                        <div class="route-point-label">Destino</div>
                        <div class="route-point-name">${destino.nombre}</div>
                    </div>
                </div>
            </div>

            <div class="route-stats">
                <div class="route-stat-card">
                    <div class="route-stat-icon"><i class="bi bi-clock-fill"></i></div>
                    <div class="route-stat-value">${stats.tiempo_min} min</div>
                    <div class="route-stat-label">Tiempo</div>
                </div>
                <div class="route-stat-card">
                    <div class="route-stat-icon"><i class="bi bi-signpost-2-fill"></i></div>
                    <div class="route-stat-value">${stats.distancia_m} m</div>
                    <div class="route-stat-label">Distancia</div>
                </div>
                <div class="route-stat-card">
                    <div class="route-stat-icon"><i class="bi bi-shoe-prints"></i></div>
                    <div class="route-stat-value">~${stats.pasos}</div>
                    <div class="route-stat-label">Pasos</div>
                </div>
            </div>

            <div class="transport-modes">
                <button class="transport-mode-btn active">
                    <i class="bi bi-person-walking"></i>
                    Caminando
                </button>
                <button class="transport-mode-btn" disabled title="Próximamente">
                    <i class="bi bi-bicycle"></i>
                    Bicicleta
                </button>
                <button class="transport-mode-btn" disabled title="Próximamente">
                    <i class="bi bi-universal-access"></i>
                    Accesible
                </button>
            </div>

            <div class="route-instructions-title">
                <span><i class="bi bi-list-ol text-primary"></i> Instrucciones</span>
            </div>
            <div class="route-steps">
                ${instrucciones.map(paso => `
                    <div class="instruction-step">
                        <div class="step-number">${paso.paso}</div>
                        <div class="step-content">
                            <div class="step-text">${paso.texto}</div>
                            ${paso.distancia ? `
                                <div class="step-distance">
                                    <i class="bi bi-arrow-right"></i> ${paso.distancia}
                                </div>
                            ` : ''}
                        </div>
                        <div class="step-icon"><i class="bi ${paso.icono}"></i></div>
                    </div>
                `).join('')}
            </div>

            ${esBeta ? `
                <div class="beta-banner">
                    <i class="bi bi-info-circle-fill"></i>
                    <span>Ruta aproximada. La versión final usará el grafo de pasillos del campus.</span>
                </div>
            ` : ''}

            <div class="route-action">
                <button class="btn-action-primary" style="width:100%; justify-content:center; padding:14px; font-size:14px;">
                    <i class="bi bi-play-fill"></i> Iniciar navegación guiada
                </button>
            </div>
        `;
    }

    // ============================================================
    // RENDER DE LA RUTA EN EL MAPA
    // ============================================================
    function renderizarRutaEnMapa(data) {
        const { origen, destino, ruta } = data;

        // Centrar el mapa entre origen y destino
        const centroLat = (origen.lat + destino.lat) / 2;
        const centroLng = (origen.lng + destino.lng) / 2;
        iniciarMapa([centroLat, centroLng], 18);

        // Pin origen
        const marcadorOrigen = L.marker([origen.lat, origen.lng], { icon: ICONO_ORIGEN });
        marcadorOrigen.bindPopup(`
            <div class="popup-title">📍 Origen</div>
            <div class="popup-meta">${origen.nombre}</div>
        `).addTo(mapa);

        // Pin destino
        const marcadorDestino = L.marker([destino.lat, destino.lng], { icon: ICONO_DESTINO });
        marcadorDestino.bindPopup(`
            <div class="popup-title">🚩 Destino</div>
            <div class="popup-meta">${destino.nombre}</div>
        `).addTo(mapa);

        // Línea de la ruta
        const polyline = L.polyline(ruta, {
            color: '#0E9E8E',
            weight: 6,
            opacity: 0.9,
            lineCap: 'round',
            lineJoin: 'round',
        }).addTo(mapa);

        // Línea blanca punteada encima (efecto "ruta animada")
        L.polyline(ruta, {
            color: '#ffffff',
            weight: 2,
            opacity: 1,
            dashArray: '8, 10',
            lineCap: 'round',
        }).addTo(mapa);

        // Ajustar zoom para que se vean ambos puntos
        const bounds = polyline.getBounds();
        mapa.fitBounds(bounds, { padding: [80, 80] });

        // Abrir popup del origen después del fit
        setTimeout(() => marcadorOrigen.openPopup(), 600);
    }

    // ============================================================
    // ERROR HANDLER
    // ============================================================
    function mostrarError(titulo, mensaje, mostrarBotonMapa = false) {
        const panel = document.getElementById('route-panel');
        panel.innerHTML = `
            <div style="padding: 40px 20px; text-align: center;">
                <div style="font-size: 48px; color: var(--color-danger); margin-bottom: 12px;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <div style="font-size: 16px; font-weight: 800; color: var(--color-heading); margin-bottom: 8px;">
                    ${titulo}
                </div>
                <p style="font-size: 13px; color: var(--color-text-muted); font-weight: 600; margin-bottom: 20px;">
                    ${mensaje}
                </p>
                ${mostrarBotonMapa ? `
                    <a href="${MAPA_URL}" class="btn-action-primary" style="justify-content:center;">
                        <i class="bi bi-map-fill"></i> Ir al mapa
                    </a>
                ` : ''}
            </div>
        `;

        document.getElementById('leaflet-map').innerHTML = `
            <div class="route-loading">
                <i class="bi bi-map" style="font-size: 48px; opacity: 0.3;"></i>
                <p style="font-size: 13px; font-weight: 600;">Mapa no disponible</p>
            </div>
        `;
    }

    // ============================================================
    // CARGAR RUTA
    // ============================================================
    async function cargarRuta() {
        try {
            const url = `${RUTA_API}?desde=${codigoDesde}&hasta=${codigoHasta}`;
            const respuesta = await fetch(url);

            if (!respuesta.ok) {
                const error = await respuesta.json().catch(() => ({}));
                throw new Error(error.error || 'Error al calcular la ruta');
            }

            const data = await respuesta.json();

            // Actualizar subtitle
            document.getElementById('topbar-subtitle').textContent =
                `${data.origen.nombre} → ${data.destino.nombre}`;

            renderizarPanel(data);
            renderizarRutaEnMapa(data);

        } catch (error) {
            console.error('Error:', error);
            mostrarError(
                'No pudimos calcular la ruta',
                error.message || 'Intenta de nuevo desde el mapa.',
                true
            );
        }
    }

    document.addEventListener('DOMContentLoaded', cargarRuta);
})();
</script>

</body>
</html>
