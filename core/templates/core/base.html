{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusGO | {% block title %}Tu Guía{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0F1F3D; --navy-mid: #1A3460; --accent: #2563EB;
            --accent-light: #EFF4FF; --gold: #C9973A; --gold-light: #FBF5E9;
            --surface: #F7F6F3; --border: #E4E1D9; --text-muted: #7A7669;
        }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--navy); min-height: 100vh; margin: 0; }
        .serif { font-family: 'DM Serif Display', serif; }
        .app-shell { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 1fr auto; min-height: 100vh; }
        .sidebar { grid-row: 1 / 3; background: var(--navy); display: flex; flex-direction: column; padding: 0; position: sticky; top: 0; height: 100vh; overflow: hidden; }
        .sidebar-brand { padding: 28px 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .brand-wordmark { font-family: 'DM Serif Display', serif; font-size: 22px; color: #fff; letter-spacing: -0.3px; line-height: 1; }
        .brand-sub { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 2px; }
        .nav-section-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 12px 6px; margin-top: 8px; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: rgba(255,255,255,0.55); text-decoration: none; transition: all 0.15s ease; cursor: pointer; }
        .nav-link:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
        .nav-link.active { background: rgba(37,99,235,0.35); color: #fff; }
        .nav-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
        .nav-link.active .nav-icon { background: var(--accent); }
        .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.07); }
        .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; transition: background 0.15s; cursor: pointer; }
        .user-chip:hover { background: rgba(255,255,255,0.07); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .user-info-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); line-height: 1.2; }
        .user-info-role { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
        .main-content { background: var(--surface); min-height: 100vh; overflow-y: auto; }
        .topbar { display: none; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--navy); position: sticky; top: 0; z-index: 100; }
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 10px 0 20px; z-index: 100; border-top: 1px solid rgba(255,255,255,0.07); }
        .bottom-nav-inner { display: flex; justify-content: space-around; }
        .bottom-nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; background: none; border: none; cursor: pointer; padding: 6px 20px; border-radius: 8px; transition: color 0.15s; }
        .bottom-nav-btn.active { color: #fff; }
        .bottom-nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin-top: 2px; opacity: 0; }
        .bottom-nav-btn.active .bottom-nav-dot { opacity: 1; }
        .page-inner { max-width: 820px; margin: 0 auto; padding: 48px 40px; }
        @media (max-width: 768px) {
            .app-shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .sidebar { display: none; }
            .topbar { display: flex; }
            .bottom-nav { display: block; }
            .main-content { padding-bottom: 80px; }
            .page-inner { padding: 28px 20px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-wordmark">CampusGO</div>
            <div class="brand-sub">Guía Universitaria</div>
        </div>
        <nav class="sidebar-nav">
            <span class="nav-section-label">Principal</span>
            <a href="#" class="nav-link active">
                <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.5"/></svg></span>
                Inicio
            </a>
            <a href="#" class="nav-link">
                <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
                Mapa del Campus
            </a>
            <span class="nav-section-label">Cuenta</span>
            <a href="#" class="nav-link">
                <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M4 17c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
                Perfil
            </a>
            <a href="#" class="nav-link">
                <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.05 5.05l1.41 1.41M13.54 13.54l1.41 1.41M5.05 14.95l1.41-1.41M13.54 6.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
                Ajustes
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-chip">
                <div class="user-avatar">MR</div>
                <div>
                    <div class="user-info-name">Mi Cuenta</div>
                    <div class="user-info-role">Estudiante</div>
                </div>
            </div>
        </div>
    </aside>

    <header class="topbar">
        <div style="font-family:'DM Serif Display',serif;font-size:18px;color:#fff;">CampusGO</div>
        <div style="width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;">MR</div>
    </header>

    <main class="main-content">
        <div class="page-inner">
            {% block content %}
            {% endblock %}
        </div>
    </main>
</div>

<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <button class="bottom-nav-btn active">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.5"/></svg>
            Inicio
            <span class="bottom-nav-dot"></span>
        </button>
        <button class="bottom-nav-btn">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Mapa
            <span class="bottom-nav-dot"></span>
        </button>
        <button class="bottom-nav-btn">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Ajustes
            <span class="bottom-nav-dot"></span>
        </button>
    </div>
</nav>

</body>
</html>
